<!DOCTYPE html>
<html>
<head>
<title>Roblox User Checker</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

.box{
    background:#222;
    padding:20px;
    border-radius:15px;
}

input{
    width:70%;
    padding:12px;
    border-radius:10px;
    border:0;
}

button{
    padding:12px 20px;
    border:0;
    border-radius:10px;
    background:#ffb700;
    font-weight:bold;
}

#result{
    margin-top:20px;
    background:#333;
    padding:15px;
    border-radius:12px;
    text-align:left;
}
</style>

</head>

<body>

<div class="box">

<h2>🔍 Roblox User Checker</h2>

<input id="username" placeholder="Nhập Roblox Username">

<button onclick="checkUser()">
Check
</button>

<div id="result">
Chưa kiểm tra
</div>

</div>


<script>

async function checkUser(){

let name = document.getElementById("username").value.trim();
let result = document.getElementById("result");


if(!name){
    result.innerHTML="⚠️ Nhập username";
    return;
}


result.innerHTML="⏳ Đang kiểm tra...";


try{

let response = await fetch(
"https://users.roblox.com/v1/users/search?keyword="
+encodeURIComponent(name)
+"&limit=10"
);


let json = await response.json();


let user = json.data.find(
x => x.name.toLowerCase() === name.toLowerCase()
);



if(user){

result.innerHTML=`

<h3>✅ User tồn tại</h3>

<b>ID:</b> ${user.id}<br>
<b>Username:</b> ${user.name}<br>
<b>Display Name:</b> ${user.displayName}

<br><br>

<details>
<summary>Xem JSON</summary>

<pre>
${JSON.stringify(user,null,2)}
</pre>

</details>

`;

}else{

result.innerHTML="❌ Không tìm thấy username";

}


}catch(error){

result.innerHTML=
"⚠️ Lỗi API: "+error.message;

}


}

</script>


</body>
</html>
